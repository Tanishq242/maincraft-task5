<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            text-align: center;
        }

        .logout {
            color: green;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <!-- Error Message -->
    <div class="error">
        <script>
            const params = new URLSearchParams(window.location.search);
            if (params.get("error")) {
                document.write("Invalid username or password");
            }
        </script>
    </div>

    <!-- Logout Message -->
    <div class="logout">
        <script>
            if (params.get("logout")) {
                document.write("Logged out successfully");
            }
        </script>
    </div>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Enter Username" required />
        <input type="password" name="password" placeholder="Enter Password" required />
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
